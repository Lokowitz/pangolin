app:
    dashboard_url: https://proxy.example.com # REPLACE THIS WITH YOUR DOMAIN
    base_domain: example.com # REPLACE THIS WITH YOUR DOMAIN
    log_level: info
    save_logs: false

server:
    external_port: 3000
    internal_port: 3001
    next_port: 3002
    internal_hostname: pangolin
    secure_cookies: true
    session_cookie_name: p_session
    resource_session_cookie_name: p_resource_session
    resource_access_token_param: p_token
    cors:
        origins: ["https://proxy.example.space"]
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        headers: ["X-CSRF-Token", "Content-Type"]
        credentials: false

traefik:
    cert_resolver: letsencrypt
    http_entrypoint: web
    https_entrypoint: websecure
    prefer_wildcard_cert: true

gerbil:
    start_port: 51820
    base_endpoint: proxy.example.com # REPLACE THIS WITH YOUR DOMAIN
    use_subdomain: false
    block_size: 24
    site_block_size: 30
    subnet_group: 100.89.137.0/20

rate_limits:
    global:
        window_minutes: 1
        max_requests: 100

email:
    smtp_host: host.hoster.net # REPLACE THIS WITH YOUR SMTP HOST
    smtp_port: 587 # REPLACE THIS WITH YOUR SMTP PORT
    smtp_user: no-reply@example.com # REPLACE THIS WITH YOUR SMTP USER
    smtp_pass: aaaaaaaaaaaaaaaaaa # REPLACE THIS WITH YOUR SMTP PASSWORD
    no_reply: no-reply@example.com # REPLACE THIS WITH YOUR NO REPLY MAIL

users:
    server_admin:
        email: admin@example.com # REPLACE THIS WITH YOUR ADMIN EMAIL
        password: Password123! # REPLACE THIS WITH YOUR ADMIN PASSWORD

flags:
    require_email_verification: false 
    disable_signup_without_invite: true
    disable_user_create_org: true